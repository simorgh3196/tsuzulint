# `.unwrap()`/`.expect()` are denied in library code (workspace clippy lints) but allowed
# in test code, where an unexpected `Err`/`None` *should* fail the test loudly.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Centralized-I/O guard: raw file/network APIs are disallowed outside the single
# `tzlint_core::io` wrappers (which opt out with a justified `#[allow(...)]`).
# This makes the most frequent past bug class (the same I/O mistake repeated across
# many entry points) structurally impossible to reintroduce. Extended as crates land.
disallowed-methods = [
    { path = "std::fs::read", reason = "use tzlint_core::io::Host::read_to_string" },
    { path = "std::fs::read_to_string", reason = "use tzlint_core::io::Host::read_to_string" },
    { path = "std::fs::write", reason = "use tzlint_core::io::Host::write_atomic" },
    { path = "std::fs::read_dir", reason = "use tzlint_core::io::Host::list_dir" },
    { path = "std::fs::create_dir", reason = "use tzlint_core::io::Host::create_dir_all" },
    { path = "std::fs::create_dir_all", reason = "use tzlint_core::io::Host::create_dir_all" },
]
# `std::fs::DirBuilder` is the only other directory-creation route; it is unused anywhere in the
# workspace, so it is left unguarded rather than adding a speculative entry. Revisit if introduced.

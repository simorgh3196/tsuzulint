name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: every job here only checks out, builds, and tests (the coverage
# job uploads via its own CODECOV_TOKEN secret), so read-only is enough. A job that ever needs
# more must opt in with its own `permissions:` block.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # clippy denies unwrap/expect (workspace lints) and disallowed-methods (clippy.toml).
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    # Only `test` runs the OS matrix: tests exercise the filesystem, path separators, and line
    # endings, where OS differences actually surface (Windows CRLF / `\`, macOS case-insensitive
    # FS). fmt/clippy/wasm/msrv/security/coverage are host-independent, so they stay Linux-only —
    # tripling them would be pure waste. `fail-fast: false` so one OS failing still reports the rest.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      # `--no-tests=warn`: a workspace with no tests yet (early milestones) or a docs/config
      # -only PR must not fail this job — nextest otherwise errors on zero tests to run.
      - run: cargo nextest run --workspace --no-tests=warn
      # Doctests are host-independent; run them once (Linux) instead of tripling identical work.
      - run: cargo test --workspace --doc
        if: matrix.os == 'ubuntu-latest'

  wasm:
    name: wasm32 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      # The morphology seam must stay wasm-clean with NO native backend (M2i): the frozen model
      # (`tzlint_ast`), the injected-provider trait (`tzlint_pdk`), and the engine + provider
      # registry + cache fingerprint (`tzlint_core`) are dictionary-free by default — embedders
      # inject providers Host-style. Build all three wasm-facing crates for both wasm targets. When
      # the native morphology backend lands (M2j, lindera) it MUST be cfg/feature-gated so it can
      # never enter this build; a regression here is the tripwire.
      - run: cargo build -p tzlint_ast -p tzlint_pdk -p tzlint_core --target wasm32-unknown-unknown
      - run: cargo build -p tzlint_ast -p tzlint_pdk -p tzlint_core --target wasm32-wasip1

  io-guard:
    name: io-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Belt-and-suspenders next to clippy disallowed-methods: a grep guard. The alternation is
      # unanchored, so `read` also catches `read_dir` and `create_dir` also catches `create_dir_all`.
      - name: reject raw fs::read*/write/create_dir* in non-io modules
        run: |
          ! git grep -nE 'std::fs::(read|write|create_dir)' -- 'crates/*/src/**.rs' \
            ':!crates/tzlint_core/src/io*' || (echo "raw fs outside io module"; exit 1)
      # Network egress has a single boundary too: the dictionary fetch goes through
      # `Host::fetch`, implemented only in the CLI's `host.rs` with `ureq`. Keep the HTTP client
      # out of every other module (and out of `tzlint_core`, which must stay network-free / wasm).
      - name: reject network clients outside the CLI host boundary
        run: |
          ! git grep -nE '\bureq\b' -- 'crates/*/src/**.rs' \
            ':!crates/tzlint_cli/src/host.rs' || (echo "network egress (ureq) must go through CliHost::fetch in host.rs"; exit 1)
      # blake3 must stay pure-Rust: without `features = ["pure"]` it builds a SIMD backend via a
      # C compiler, breaking the uniform/reproducible build and wasm32. Guard the manifest.
      - name: blake3 must keep features = ["pure"]
        run: |
          git grep -qE 'blake3 = \{.*features = \[.*"pure"' -- Cargo.toml \
            || (echo "blake3 must be configured with features = [\"pure\"]"; exit 1)

  msrv:
    name: MSRV 1.94
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pin the *action* to a branch ref (not the `@1.94.0` version tag) so Dependabot
      # doesn't bump it to the newest tag (e.g. a not-yet-released Rust). The MSRV is
      # selected explicitly via `toolchain` — keep it in sync with `rust-version` in the
      # root Cargo.toml `[workspace.package]`.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  security:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      # Coverage is measured over the nextest-run tests (stable toolchain). Doctests are
      # exercised for pass/fail in the `test` job; doctest *line* coverage requires nightly
      # (`cargo llvm-cov --doctests`) and is intentionally omitted here.
      - name: Generate coverage (lcov)
        run: cargo llvm-cov nextest --workspace --no-tests=warn --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # required for private repos / protected branches
          files: lcov.info
          fail_ci_if_error: false # coverage is informational, not a gate

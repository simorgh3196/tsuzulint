# cargo-deny configuration — lints the dependency graph for advisories, licenses,
# bans, and sources. Docs: https://embarkstudios.github.io/cargo-deny/
# Run locally with `cargo deny check`; CI runs it in the `security` job.

[advisories]
# RustSec security advisories and unmaintained crates are denied by default.
# Add specific advisory IDs here (with a justification) only if ever needed.
ignore = []

[licenses]
# Require high confidence when inferring a license from crate text.
confidence-threshold = 0.93
# Permissive licenses compatible with this Apache-2.0-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # Data (not code) license: the Mozilla CA root bundle shipped by `webpki-roots`, pulled in by
    # `ureq`'s rustls TLS for the CLI dictionary fetch. CDLA-Permissive-2.0 is a permissive,
    # attribution-only data-sharing license, compatible with this Apache-2.0 project.
    "CDLA-Permissive-2.0",
]

[bans]
# Warn (not fail) on duplicate versions while the tree is small; forbid wildcard versions.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
